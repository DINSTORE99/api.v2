<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Playground - DIN STORE API</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0b1020;
color:white;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#2563eb33,transparent 60%),
radial-gradient(circle at bottom,#00d4ff22,transparent 60%);
z-index:-1;
}

.container{

max-width:900px;

margin:auto;

padding:50px 20px;

}

.back{

display:inline-block;

margin-bottom:25px;

padding:10px 18px;

background:#111827;

border-radius:10px;

color:white;

text-decoration:none;

}

h1{

font-size:42px;

margin-bottom:10px;

}

p{

color:#94a3b8;

margin-bottom:35px;

}

.card{

background:#111827;

border:1px solid #1f2937;

padding:25px;

border-radius:15px;

margin-bottom:25px;

}

label{

display:block;

margin-bottom:8px;

font-weight:600;

}

select,input{

width:100%;

padding:14px;

border:none;

outline:none;

background:#0f172a;

color:white;

border-radius:10px;

margin-bottom:20px;

}

button{

padding:14px 25px;

background:#2563eb;

border:none;

border-radius:10px;

color:white;

font-size:15px;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

pre{

background:#0f172a;

padding:20px;

border-radius:10px;

overflow:auto;

white-space:pre-wrap;

margin-top:20px;

}

.loading{

display:none;

margin-top:20px;

color:#60a5fa;

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<a href="/" class="back">

← Home

</a>

<h1>

⚡ Playground

</h1>

<p>

Coba endpoint API secara langsung.

</p>

<div class="card">

<label>

Endpoint

</label>

<select id="endpoint">

<option value="/api/ai/gemini">

AI - Gemini

</option>

<option value="/api/maker/brat">

Maker - Brat

</option>

<option value="/api/downloader/tiktok">

Downloader - TikTok

</option>

</select>

<label>

Parameter

</label>

<input

id="query"

placeholder="Masukkan parameter..."

>

<button onclick="executeApi()">

Execute

</button>

<div class="loading" id="loading">

⏳ Mengirim request...

</div>

<pre id="result">

Response akan muncul di sini...

</pre>

</div>

</div>

<script>

async function executeApi(){

const endpoint=document.getElementById("endpoint").value;

const query=document.getElementById("query").value;

document.getElementById("loading").style.display="block";

document.getElementById("result").textContent="";

try{

const res=await fetch(

endpoint+

"?query="+

encodeURIComponent(query)

);

const json=await res.json();
